<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
</head>

<body>
    <div>

            border-radius: 8px;

        button{
            width: 100%;
            background-color: blue;
            color: white;

        a{

            text-decoration: none;
