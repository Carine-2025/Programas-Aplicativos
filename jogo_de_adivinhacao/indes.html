<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width; initial-scale=1.0" />
    <title>Jogo de Advinhação</title>
  </head>

  <body>
    <input
      id="palpite"
      type="number"
      placeholder="De 1 a 10, qual seu palpite?"
    />
    <button onclick="jogar()">Tentar</button>
    <p id="feedback"></p>
    <p id="tentativas"></p>

    <script>
      let num_sorteado = Math.floor(Math.random() * 10) + 1;
      let contador = 0;

      function jogar(){

        let novo_palpite = 
        Number (document.getElementById("palpite").value);

        contador++;

      if (novo_palpite === num_sorteado){
          document.getElementById("feedback").innerText = "Acertou!"
      }else if (novo_palpite > num_sorteado){
          document.getElementById("feedback").innerText = "Muito alto!"
      }else {
          document.getElementById("feedback").innerText = "Muito baixo!"
      }

      document.getElementById("tentativas").innerText = "Tentativas: " + contador;

    }
    </script>
  </body>
</html>
