<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
</head>

<body style="
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        height: 100vh;
        ">
    <div class="container">
        <h1>LOGIN</h1>
        <input type="email" placeholder="Seu e-mail">
        <input type="password" placeholder="Sua senha">
        <button>ENTRAR</button>
        <a href="URL">Esqueci minha senha</a>
    </div>
</body>

<style>
    .container {

        width: 500px;
        height: 700px;
        border: 2px;
        background-image: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), url('https://img.magnific.com/fotos-gratis/vidro-transparente-com-agua_23-2148795911.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        flex-direction: column;
        gap: 80px;
        

        h1 {
            font-family: fantasy;
            font-size: 40px;
            color: white;
            text-shadow: 4px 4px 4px #000;

        }

        input {
            border: 2px solid rgb(86, 174, 214);
            width: 300px;
            font-size: 20px;
            border-radius: 8px;
            padding: 10px 8px;
            color: rgb(12, 113, 207);
        }

        button {
            padding: 8px 20px;
            font-size: 20px;
            border-radius: 8px;
            background: rgb(55, 134, 209);
            color: white;
        }

        a{
          background: white;
          border-radius: 8px;
          padding: 4px;            
        }

    }
</style>

</html>
