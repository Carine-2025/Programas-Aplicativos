     let lista = [];

        function adicionar() {

            const nova_tarefa =
                document.getElementById("tarefa").value;

            if (nova_tarefa.trim() == "") {

                alert("Digite uma tarefa!");

                return;
            }

            lista.push(nova_tarefa);

            mostrarTarefas();

            document.getElementById("tarefa").value = "";

        }

        function mostrarTarefas() {

            let html = "";

            for (let i = 0; i < lista.length; i++) {

                html += "<li>" + lista[i] + "</li>";

            }

            document.getElementById("tarefas").innerHTML = html;

        }
    </script>
